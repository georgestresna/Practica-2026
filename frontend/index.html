<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="utf-8">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <title>App Biserici</title>
</head>

<body>
  <h1>App Biserici</h1>

  <h2>Model 3D</h2>
  <model-viewer 
    src="/models/scene.gltf" 
    alt="Model 3D biserica" 
    camera-controls auto-rotate 
    shadow-intensity="1"
    style="width: 100%; height: 500px; background-color: #eee;">
  </model-viewer>

  <h2>Status</h2>
  <button onclick="checkHealth()">Verifica</button>
  <pre id="status">-</pre>

  <h2>Upload document</h2>
  <input type="file" id="file">
  <button onclick="upload()">Trimite</button>
  <pre id="upload-result"></pre>

  <h2>Documente</h2>
  <button onclick="loadDocs()">Reincarca lista</button>
  <ul id="docs"></ul>

  <h2>Detalii document</h2>
  <pre id="detail">Click pe un document din lista.</pre>

  <script>
    const API = "http://localhost:8000";

    async function checkHealth() {
      const out = document.getElementById("status");
      try {
        const health = await (await fetch(`${API}/health`)).json();
        const ocr = await (await fetch(`${API}/ocr-test`)).json();
        out.textContent = JSON.stringify({ health, ocr }, null, 2);
      } catch (e) {
        out.textContent = "Eroare: " + e;
      }
    }

    async function loadDocs() {
      const ul = document.getElementById("docs");
      ul.innerHTML = "";
      try {
        const docs = await (await fetch(`${API}/documente`)).json();
        if (!docs.length) {
          ul.innerHTML = "<li>Niciun document.</li>";
          return;
        }
        docs.forEach(d => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = "#";
          a.textContent = `#${d.id} - ${d.titlu} [${d.status}]`;
          a.onclick = (e) => { e.preventDefault(); showDetail(d.id); };
          li.appendChild(a);
          ul.appendChild(li);
        });
      } catch (e) {
        ul.innerHTML = "<li>Eroare: " + e + "</li>";
      }
    }

    async function showDetail(id) {
        const out = document.getElementById("detail");
        out.textContent = "Se incarca...";
        try {
          const doc = await (await fetch(`${API}/documente/${id}`)).json();
          const text = doc.text.length ? doc.text[0].continut : "";
          const entitati = doc.entitati.map(e => `${e.tip}: ${e.valoare}`).join("\n");

          out.innerHTML = `
      <p><b>#${doc.id}</b> - ${doc.titlu} | status: <b id="st">${doc.status}</b></p>

      <p>
        <button onclick="setStatus(${id}, 'reviewed')">Marcheaza revizuit</button>
        <button onclick="setStatus(${id}, 'validated')">Valideaza</button>
        <button onclick="setStatus(${id}, 'raw')">Inapoi la raw</button>
      </p>

      <p>Text OCR (editabil):</p>
      <textarea id="txt" rows="8" cols="80">${text}</textarea><br>
      <button onclick="saveText(${id})">Salveaza textul</button>
      <span id="save-msg"></span>

      <p>Entitati:</p>
      <pre>${entitati || "-"}</pre>
    `;
        } catch (e) {
          out.textContent = "Eroare: " + e;
        }
      }

      async function setStatus(id, status) {
        try {
          const r = await fetch(`${API}/documente/${id}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });
          const d = await r.json();
          document.getElementById("st").textContent = d.status;
          loadDocs();
        } catch (e) {
          alert("Eroare: " + e);
        }
      }

      async function saveText(id) {
        const msg = document.getElementById("save-msg");
        msg.textContent = "Se salveaza...";
        try {
          const continut = document.getElementById("txt").value;
          await fetch(`${API}/documente/${id}/text`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ continut })
          });
          msg.textContent = "Salvat.";
        } catch (e) {
          msg.textContent = "Eroare: " + e;
        }
      }

    async function upload() {
      const input = document.getElementById("file");
      const out = document.getElementById("upload-result");
      if (!input.files.length) { out.textContent = "Alege un fisier."; return; }
      const fd = new FormData();
      fd.append("file", input.files[0]);
      out.textContent = "Se trimite...";
      try {
        const r = await fetch(`${API}/documente/upload`, { method: "POST", body: fd });
        out.textContent = JSON.stringify(await r.json(), null, 2);
        loadDocs();
      } catch (e) {
        out.textContent = "Eroare: " + e;
      }
    }

    checkHealth();
    loadDocs();
  </script>
</body>

</html>
