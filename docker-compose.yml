services:
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
      - ./frontend/models:/usr/share/nginx/html/models:ro
      - ./frontend/style.css:/usr/share/nginx/html/style.css:ro
      - ./frontend/upload.html:/usr/share/nginx/html/upload.html:ro
      - ./frontend/upload.js:/usr/share/nginx/html/upload.js:ro
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OCR_SERVICE_URL: http://ocr:8001
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./uploads:/data/uploads

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data

  ocr:
    build: ./ocr
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/data/uploads:ro

volumes:
  pgdata:
